name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install markdownlint-cli
        run: npm install -g [email protected]
      - name: Markdown lint
        run: markdownlint --config .markdownlint.json '**/*.md'
